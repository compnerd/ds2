name: doxygen

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  doxygen:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - run: |
          sudo apt-get install -y doxygen

      - uses: mattnotmitt/doxygen-action@v1.12
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: html
